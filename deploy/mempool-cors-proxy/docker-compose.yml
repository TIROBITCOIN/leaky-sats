# Optional compose wrapper for Umbrel Tailscale app installs.
# The service shares tailscale_web_1's network namespace so 127.0.0.1 means
# the same localhost Tailscale Serve can proxy to.

services:
  mempool-cors-proxy:
    image: caddy:2.8-alpine
    container_name: tailscale-mempool-localhost-proxy
    restart: unless-stopped
    network_mode: "container:tailscale_web_1"
    environment:
      MEMPOOL_UPSTREAM: ${MEMPOOL_UPSTREAM:-http://127.0.0.1:3006}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
