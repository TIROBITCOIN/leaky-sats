[build]
command = "npm run build"
publish = "dist"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# 서비스워커와 앱 shell은 항상 재검증해서 새 배포를 즉시 인식하게 한다(해시된 정적 자산은 그대로 캐시).
[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "no-cache"

[[headers]]
for = "/manifest.webmanifest"
[headers.values]
Cache-Control = "no-cache"
