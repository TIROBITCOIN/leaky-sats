# Dependabot: weekly dependency and GitHub Actions updates.
# Also enable "Dependabot security updates" in the repo Security settings
# (Settings → Code security → Dependabot) so vulnerable packages get PRs automatically.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      # Bundle minor/patch bumps into fewer PRs for lower review noise.
      production-minor:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
